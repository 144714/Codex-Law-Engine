name: Autonomous Legislator
on:
  issues:
    types: [opened]

jobs:
  legislate:
    if: github.event.issue.title == 'MASS_SCAN_REQUEST'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # עדכון לגרסה 4

      - name: Set up Python
        uses: actions/setup-python@v5 # התיקון כאן: הוספנו actions/
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install openai

      - name: Run Legislative Engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # שאיבת האתרים מתוך תוכן ה-Issue והפיכתם לרשימה מופרדת בפסיקים
          SITES=$(echo "${{ github.event.issue.body }}" | tr '\n' ',')
          python generator_engine.py "$SITES"

      - name: Commit and Push Laws
        run: |
          git config --global user.name "Codex-Bot"
          git config --global user.email "bot@codex.law"
          git add Market_Analysis/scanned_laws.json
          git commit -m "New Laws Codified from Issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push

      - name: Close Issue
        run: gh issue close ${{ github.event.issue.number }} --comment "Laws have been successfully added to the Codex."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
