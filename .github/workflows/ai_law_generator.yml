name: Codex AI Generator
on:
  workflow_dispatch: 

permissions:
  contents: write # נותן לרובוט רשות לכתוב קבצים בגיטהב שלך

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Run AI Generation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generator_engine.py

      - name: Commit and Push changes # השלב ששומר את הקובץ באמת
        run: |
          git config --global user.name "Codex-Bot"
          git config --global user.email "bot@codex.ai"
          git add generated_laws.json
          git commit -m "AI generated a new law" || echo "No changes to commit"
          git push
