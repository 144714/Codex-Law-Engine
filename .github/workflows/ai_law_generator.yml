name: Codex Genesis Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install openai
      - name: Execute Oracle
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generator_engine.py
      - name: Sync Cloud Database
        run: |
          git config --global user.name "Codex-System-Bot"
          git config --global user.email "bot@codex.ai"
          git add .
          git commit -m "Auto-Update: Global Intelligence Sync [skip ci]" || echo "No changes"
          git push origin main
