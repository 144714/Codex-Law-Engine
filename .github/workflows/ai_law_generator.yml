name: Codex AI Generator
on:
  workflow_dispatch: 
  repository_dispatch:
    types: [generate_new_law]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # עודכן לגרסה חדשה

      - name: Set up Python
        uses: actions/setup-python@v5 # עודכן לגרסה חדשה
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Run AI Generation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generator_engine.py
