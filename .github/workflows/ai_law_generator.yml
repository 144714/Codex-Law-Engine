name: Codex AI Generator
on:
  workflow_dispatch: 
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Run AI Generation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generator_engine.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Codex-Mass-Generator"
          git config --global user.email "bot@codex.ai"
          git add .
          git commit -m "Generated mass laws for all categories" || echo "No changes"
          git push
