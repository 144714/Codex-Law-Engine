name: Codex Global Ingestion Pipeline

on:
  schedule:
    - cron: '0 * * * *' # הרצה אוטומטית בכל שעה עגולה
  workflow_dispatch:   # הפעלה ידנית לצורך בדיקה

permissions:
  contents: write

jobs:
  run-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Logic
        run: pip install openai

      - name: Execute Autonomous Scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generator_engine.py

      - name: Sync Database
        run: |
          git config --global user.name "Codex-System-Bot"
          git config --global user.email "bot@codex.ai"
          git add .
          git commit -m "Pipeline Sync: Ingested Global DNA [skip ci]" || echo "No changes"
          git push origin main
