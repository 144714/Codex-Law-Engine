name: Codex Law Engine Audit

on:
  workflow_dispatch: # מאפשר לך להריץ ידנית בלחיצת כפתור
    inputs:
      sites:
        description: 'Sites to audit (comma separated)'
        required: true
        default: 'google.com, stripe.com'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install openai

    - name: Run Generator Engine
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python generator_engine.py "${{ github.event.inputs.sites }}"

    - name: Commit and Push Categorized Laws
      run: |
        git config --global user.name "Codex-Bot"
        git config --global user.email "bot@codex.analysis"
        git add Market_Analysis/
        # אם אין שינויים, הפקודה לא תיכשל
        git commit -m "Auto-update: Laws categorization" || echo "No changes to commit"
        git push
