name: Codex AI Generator
on:
  workflow_dispatch:
    inputs:
      target_site:
        description: 'האתר לסריקה'
        required: false
        default: ''
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Run AI Generation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generator_engine.py "${{ github.event.inputs.target_site }}"

      - name: Commit and push changes
        run: |
         git config --global user.name "github-actions[bot]"
         git config --global user.email "github-actions[bot]@users.noreply.github.com"
         git add Market_Analysis/scanned_laws.json
         git commit -m "Update scanned laws for ${{ github.event.inputs.target_site }}" || echo "No changes to commit"
         git push
