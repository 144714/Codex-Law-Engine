name: Enterprise DNA Pipeline
on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  ingest:
    if: contains(github.event.issue.title, 'MASS_SCAN_REQUEST') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with: { python-version: '3.9' }
      - run: pip install openai
      - name: Execution
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python generator_engine.py
      - name: Push Database Update
        run: |
          git config --global user.name "Codex-System"
          git config --global user.email "system@codex.ai"
          git add Market_Analysis/
          git commit -m "Auto-Ingest: DNA Metadata Update [skip ci]" || echo "No changes"
          git push
