name: Codex AI Generator
on:
  workflow_dispatch: # זה מה שיוסיף לך את כפתור ההפעלה הידני!
  repository_dispatch:
    types: [generate_new_law]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install openai

      - name: Run AI Generation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generator_engine.py
