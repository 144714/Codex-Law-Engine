<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Law Engine | ספר החוקים הדיגיטלי</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; padding-top: 50px; }
        .legislator-card { background: #1e293b; border: 1px solid #334155; border-radius: 15px; }
        .law-card { background: #ffffff; color: #1e293b; border-radius: 12px; border-right: 5px solid #3b82f6; transition: 0.3s; height: 100%; }
        .law-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .badge-id { background: #334155; color: #3b82f6; font-weight: bold; }
        .site-header { border-bottom: 2px solid #3b82f6; padding-bottom: 10px; margin-top: 40px; color: #60a5fa; }
        textarea { background: #0f172a !important; color: #10b981 !important; border: 1px solid #334155 !important; font-family: monospace; }
        
        /* צבעים לפי סטטוס */
        .status-Issue { border-right-color: #ef4444 !important; } /* אדום לתקלה */
        .status-Compliant { border-right-color: #10b981 !important; } /* ירוק לחוק תקין */
        
        .nav-pills .nav-link { color: #f8fafc; border: 1px solid #334155; margin: 5px; }
        .nav-pills .nav-link.active { background-color: #3b82f6; border-color: #3b82f6; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">⚖️ Codex Law Engine</h1>
        <p class="lead text-secondary">מערכת חקיקה אוטונומית - ניתוח קטגוריאלי בזמן אמת</p>
    </div>

    <div class="d-flex justify-content-center flex-wrap mb-4 nav nav-pills" id="categoryFilters">
        <button class="nav-link active" onclick="loadData('scanned_laws.json', this)">הכל (All)</button>
        <button class="nav-link" onclick="loadData('Security/security_laws.json', this)">אבטחה</button>
        <button class="nav-link" onclick="loadData('UI-Design/ui-design_laws.json', this)">עיצוב (UI)</button>
        <button class="nav-link" onclick="loadData('Accessibility/accessibility_laws.json', this)">נגישות</button>
        <button class="nav-link" onclick="loadData('Performance/performance_laws.json', this)">ביצועים</button>
        <button class="nav-link" onclick="loadData('UX-Flow/ux-flow_laws.json', this)">חווית משתמש (UX)</button>
    </div>

    <div class="legislator-card p-4 mb-5 shadow-lg">
        <h4 class="mb-3 text-info">🔨 מרכז חקיקה המוני</h4>
        <textarea id="siteList" class="form-control mb-3" rows="3" placeholder="הכנס כתובות אתרים, אחת בכל שורה..."></textarea>
        <button onclick="startMassLegislation()" class="btn btn-info w-100 fw-bold">הפעל סריקת AI ושאיבת חוקים</button>
    </div>

    <div id="dashboard" class="row">
        <div class="text-center">
            <div class="spinner-border text-info" role="status"></div>
            <p class="mt-2">טוען את המידע...</p>
        </div>
    </div>
</div>

<script>
    async function loadData(fileName, btnElement = null) {
        // עדכון כפתור פעיל
        if (btnElement) {
            document.querySelectorAll('#categoryFilters .nav-link').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        try {
            const response = await fetch(`Market_Analysis/${fileName}?t=${Date.now()}`);
            if (!response.ok) {
                document.getElementById('dashboard').innerHTML = '<div class="text-center text-muted">אין נתונים זמינים בקטגוריה זו כרגע.</div>';
                return;
            }
            
            const data = await response.json();
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = ''; 

            for (const [site, info] of Object.entries(data)) {
                if (!site || !info) continue;

                // יצירת כותרת אתר
                const siteSection = document.createElement('div');
                siteSection.className = 'col-12';
                siteSection.innerHTML = `<h3 class="site-header mt-5">🌐 מקור החוק: ${site}</h3>`;
                dashboard.appendChild(siteSection);

                // נירמול הנתונים למערך אחד
                const laws = Object.entries(info);

                laws.forEach(([id, details]) => {
                    const status = details.status || "Issue";
                    const statusIcon = status === "Compliant" ? "✅" : "⚠️";
                    const statusText = status === "Compliant" ? "תקין" : "תקלה";
                    
                    const lawCard = document.createElement('div');
                    lawCard.className = 'col-md-6 col-lg-4 mb-4';
                    lawCard.innerHTML = `
                        <div class="card law-card shadow status-${status}">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="badge badge-id">${id}</span>
                                    <span class="badge ${status === 'Compliant' ? 'bg-success' : 'bg-danger'} small">
                                        ${statusIcon} ${statusText}
                                    </span>
                                </div>
                                <h6 class="fw-bold mb-2">${details.title || "חוק ללא כותרת"}</h6>
                                <p class="small text-muted mb-2">${details.description || ""}</p>
                                <hr class="opacity-25">
                                <p class="small text-info mb-0"><strong>תיקון:</strong> ${details.remediation || "לא נדרש"}</p>
                            </div>
                        </div>`;
                    dashboard.appendChild(lawCard);
                });
            }
        } catch (e) { 
            console.error("Error parsing laws:", e);
            document.getElementById('dashboard').innerHTML = '<div class="text-center text-danger">שגיאה בטעינת הנתונים.</div>';
        }
    }

    function startMassLegislation() {
        const siteText = document.getElementById('siteList').value.trim();
        if (!siteText) {
            alert("נא להזין לפחות כתובת אחת");
            return;
        }

        const GITHUB_USERNAME = "144714"; 
        const REPO_NAME = "Codex-Law-Engine";
        const url = `https://github.com/${GITHUB_USERNAME}/${REPO_NAME}/issues/new?title=MASS_SCAN_REQUEST&body=${encodeURIComponent(siteText)}`;
        window.open(url, '_blank');
    }

    // טעינה ראשונית - הכל
    loadData('scanned_laws.json');
</script>

</body>
</html>
