<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Codex DNA | Enterprise Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #3b82f6; --success: #10b981; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; }
        
        .sidebar { width: 300px; height: 100vh; background: var(--card); border-left: 1px solid #1e293b; padding: 25px; position: fixed; overflow-y: auto; }
        .main { margin-right: 300px; padding: 40px; width: 100%; }
        
        .nav-link-custom { color: #94a3b8; padding: 12px; border-radius: 8px; cursor: pointer; display: block; text-decoration: none; transition: 0.2s; margin-bottom: 5px; }
        .nav-link-custom:hover, .nav-link-custom.active { background: var(--accent); color: white; }
        
        .law-card { background: var(--card); border: 1px solid #1e293b; border-radius: 12px; padding: 20px; height: 100%; transition: 0.3s; border-top: 3px solid var(--accent); }
        .law-card:hover { transform: translateY(-5px); border-color: var(--success); }
        
        .token-badge { background: #020617; color: var(--success); padding: 8px; border-radius: 6px; font-family: monospace; font-size: 0.85rem; margin-top: 15px; border: 1px solid #064e3b; display: block; }
        .search-box { background: var(--card); border: 1px solid #1e293b; color: white; padding: 15px; border-radius: 10px; width: 100%; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 class="fw-bold text-white mb-4">⚖️ Codex DNA</h2>
    <div id="category-nav">
        <p class="text-secondary">מתחבר למסד הנתונים...</p>
    </div>
</div>

<div class="main">
    <input type="text" id="siteSearch" class="search-box" placeholder="חפש אתר או חוק במיליון האתרים המובילים..." onkeyup="filterView()">
    <div id="loader" class="text-center d-none"><div class="spinner-border text-primary"></div></div>
    <div id="content-grid" class="row g-4">
        <div class="text-center p-5 opacity-50">
            <h3>מערכת סריקה גלובלית פעילה</h3>
            <p>בחר קטגוריה מהתפריט כדי לצפות בנתוני ה-DNA שנאספו</p>
        </div>
    </div>
</div>

<script>
    let masterIndex = {};

    async function init() {
        try {
            const res = await fetch('Market_Analysis/master_index.json?t=' + Date.now());
            masterIndex = await res.json();
            renderSidebar();
        } catch (e) { console.error("Index file missing"); }
    }

    function renderSidebar() {
        const nav = document.getElementById('category-nav');
        nav.innerHTML = Object.keys(masterIndex).map(cat => 
            `<div class="nav-link-custom" onclick="loadCategory('${cat}', this)">📁 ${cat.replace('_', ' ')}</div>`
        ).join('');
    }

    async function loadCategory(cat, el) {
        document.querySelectorAll('.nav-link-custom').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        const grid = document.getElementById('content-grid');
        grid.innerHTML = '<div class="spinner-border text-primary mx-auto mt-5"></div>';
        
        let fullHtml = '';
        const sites = masterIndex[cat];

        for (const site of sites) {
            try {
                const res = await fetch(`Market_Analysis/${cat}/${site.replace('.', '_')}.json`);
                const data = await res.json();
                
                fullHtml += `<div class="col-12 mt-5"><h4 class="text-info border-bottom pb-2">🌐 ${site}</h4></div>`;
                data.laws.forEach(law => {
                    fullHtml += `
                        <div class="col-md-6 col-lg-4">
                            <div class="law-card">
                                <h6 class="fw-bold">${law.title}</h6>
                                <p class="small text-secondary">${law.description}</p>
                                <div class="small text-white-50"><b>תיקון:</b> ${law.remediation}</div>
                                ${law.design_token && law.design_token !== 'N/A' ? `<code class="token-badge">${law.design_token}</code>` : ''}
                            </div>
                        </div>`;
                });
            } catch (e) { console.warn("Missing file for", site); }
        }
        grid.innerHTML = fullHtml;
    }

    window.onload = init;
</script>
</body>
</html>
