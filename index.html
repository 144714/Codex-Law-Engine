<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex DNA Engine | המאגר המלא</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; padding-top: 40px; }
        .legislator-card { background: #0f172a; border: 1px solid #3b82f6; border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        textarea { background: #020617 !important; color: #10b981 !important; border: 1px solid #1e293b !important; font-family: monospace; }
        
        .nav-pills .nav-link { color: #94a3b8; border: 1px solid #1e293b; margin: 5px; }
        .nav-pills .nav-link.active { background-color: #3b82f6; color: white; }
        
        .site-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; margin-bottom: 40px; padding: 20px; }
        .site-title { color: #60a5fa; font-weight: 800; border-right: 4px solid #3b82f6; padding-right: 15px; margin-bottom: 20px; }
        
        .law-card { background: #1e293b; border-radius: 12px; padding: 15px; height: 100%; border-right: 4px solid #334155; }
        .token-code { background: #020617; color: #10b981; padding: 5px; border-radius: 4px; font-size: 0.85em; display: block; mt-2; }
        
        #loading { display: none; text-align: center; padding: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">⚖️ Codex DNA Engine</h1>
        <p class="lead text-secondary">ניהול חקיקה דיגיטלית וסריקת DNA של אתרים</p>
    </div>

    <div class="legislator-card shadow-lg">
        <h4 class="mb-3 text-info">🔨 מרכז חקיקה והרצת סקריפט</h4>
        <textarea id="siteList" class="form-control mb-3" rows="3" placeholder="הכנס כתובות אתרים (מופרדות בפסיקים או שורות)..."></textarea>
        <button onclick="startMassLegislation()" class="btn btn-info w-100 fw-bold">הפעל סריקת AI ושאיבת DNA</button>
    </div>

    <div class="d-flex justify-content-center flex-wrap mb-5 nav nav-pills">
        <button class="nav-link active" onclick="loadData('scanned_laws.json', this)">📚 המאגר הישן (100 אתרים)</button>
        <button class="nav-link" onclick="loadData('UI-Design/ui-design_vault.json', this)">🎨 עיצוב (DNA)</button>
        <button class="nav-link" onclick="loadData('Security/security_vault.json', this)">🛡️ אבטחה</button>
        <button class="nav-link" onclick="loadData('UX-Flow/ux-flow_vault.json', this)">🧠 חווית משתמש</button>
    </div>

    <div id="loading">
        <div class="spinner-border text-info" role="status"></div>
        <p class="mt-2">טוען נתונים מהשרת...</p>
    </div>

    <main id="dashboard"></main>
</div>

<script>
    async function loadData(filePath, btn) {
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        const dashboard = document.getElementById('dashboard');
        const loader = document.getElementById('loading');
        
        dashboard.innerHTML = '';
        loader.style.display = 'block';

        try {
            // טעינה עם מנגנון מניעת Cache
            const response = await fetch(`Market_Analysis/${filePath}?t=${Date.now()}`);
            if (!response.ok) throw new Error("File not found");
            
            const data = await response.json();
            loader.style.display = 'none';

            for (const [site, info] of Object.entries(data)) {
                const siteSection = document.createElement('div');
                siteSection.className = 'site-card shadow';
                
                let cardsHtml = '';
                // המנגנון יודע לטפל גם במבנה הישן וגם בחדש (Vault)
                Object.entries(info).forEach(([id, details]) => {
                    cardsHtml += `
                        <div class="col-md-6 col-lg-4 mb-3">
                            <div class="law-card">
                                <small class="text-muted">${id}</small>
                                <h6 class="fw-bold text-white mt-1">${details.title || 'חוק ללא כותרת'}</h6>
                                <p style="font-size: 0.85em;" class="text-secondary">${details.description || ''}</p>
                                <p style="font-size: 0.85em;" class="text-info"><strong>תיקון:</strong> ${details.remediation || 'תקין'}</p>
                                ${details.design_token ? `<code class="token-code">${details.design_token}</code>` : ''}
                            </div>
                        </div>
                    `;
                });

                siteSection.innerHTML = `<h3 class="site-title">🌐 ${site}</h3><div class="row">${cardsHtml}</div>`;
                dashboard.appendChild(siteSection);
            }
        } catch (e) {
            loader.style.display = 'none';
            dashboard.innerHTML = `<div class="text-center p-5 text-muted">לא נמצאו נתונים בקובץ <b>${filePath}</b>. הרץ סריקה קודם!</div>`;
        }
    }

    function startMassLegislation() {
        const siteText = document.getElementById('siteList').value.trim();
        if (!siteText) { alert("נא להזין כתובות"); return; }
        
        // החלף את הפרמטרים כאן לשם המשתמש והריפו שלך!
        const GITHUB_USERNAME = "144714"; 
        const REPO_NAME = "Codex-Law-Engine";
        const url = `https://github.com/${GITHUB_USERNAME}/${REPO_NAME}/issues/new?title=MASS_SCAN_REQUEST&body=${encodeURIComponent(siteText)}`;
        window.open(url, '_blank');
    }

    // טעינה ראשונית - המאגר הכללי
    window.onload = () => loadData('scanned_laws.json');
</script>

</body>
</html>
