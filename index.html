<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Codex | מרכז הבקרה העולמי</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(45deg, #1f6feb, #238636); padding: 40px; border-radius: 0 0 20px 20px; text-align: center; }
        .card { background-color: #161b22; border: 1px solid #30363d; color: white; margin-bottom: 20px; }
        .vulnerability-high { color: #ff7b72; font-weight: bold; }
        .fix-law { background-color: #238636; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.9em; }
        #loading { display: block; text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>CODEX LAW ENGINE</h1>
    <p>סורק הבינה המלאכותית הגלובלי - הזן אתר לסריקה מיידית</p>
    
    <div class="container mt-4">
        <div class="input-group mb-3 shadow-lg" style="max-width: 600px; margin: 0 auto;">
            <input type="text" id="siteInput" class="form-control form-control-lg" placeholder="example.com">
            <button class="btn btn-warning btn-lg" type="button" onclick="triggerScan()">🔍 סרוק עכשיו</button>
        </div>
        <div id="statusMsg" class="mt-2 text-white-50"></div>
    </div>
</div>

<div class="container mt-5">
    <h3 class="mb-4">📋 ממצאים אחרונים מהרשת</h3>
    <div id="loading">📡 מתחבר למסד הנתונים...</div>
    <div id="dashboard" class="row"></div>
</div>

<script>
    // הגדרות גיטהב - תחליף את הערכים כאן בפרטים שלך
    const GITHUB_AUTH = "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// המפתח שייצרת בשלב 1
    const REPO_OWNER = "144714"; 
    const REPO_NAME = "Codex-Law-Engine";

    async function triggerScan() {
        const site = document.getElementById('siteInput').value;
        const msg = document.getElementById('statusMsg');
        if(!site) return alert("נא להזין אתר");

        msg.innerHTML = `🚀 שולח פקודה ל-Codex...`;

        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/ai_law_generator.yml/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GITHUB_AUTH}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    ref: 'main', // או master, תלוי בשם ה-branch שלך
                    inputs: { target_site: site }
                })
            });

            if (response.ok) {
                msg.innerHTML = `✅ הפקודה התקבלה! ה-AI התחיל לסרוק את ${site}. <br> התוצאות יופיעו כאן בעוד כ-2 דקות.`;
            } else {
                const err = await response.json();
                msg.innerHTML = `❌ שגיאה בהפעלת הסורק: ${err.message}`;
            }
        } catch (e) {
            msg.innerHTML = `❌ תקלה בתקשורת: ${e.message}`;
        }
    }

    // פונקציית טעינת הנתונים (נשארת אותו דבר)
    async function loadData() {
        // ... הקוד הקיים שלך לטעינת ה-JSON
    }
    loadData();
    // רענון אוטומטי כל דקה כדי לראות תוצאות חדשות
    setInterval(loadData, 60000); 
</script>
</body>
</html>
