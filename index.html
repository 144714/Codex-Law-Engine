<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Codex | מרכז הבקרה העולמי</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(45deg, #1f6feb, #238636); padding: 40px; border-radius: 0 0 20px 20px; text-align: center; }
        .card { background-color: #161b22; border: 1px solid #30363d; color: white; margin-bottom: 20px; }
        .vulnerability-high { color: #ff7b72; font-weight: bold; }
        .fix-law { background-color: #238636; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.9em; }
        #loading { display: block; text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>CODEX LAW ENGINE</h1>
    <p>סורק הבינה המלאכותית הגלובלי - הזן אתר לסריקה מיידית</p>
    
    <div class="container mt-4">
        <div class="input-group mb-3 shadow-lg" style="max-width: 600px; margin: 0 auto;">
            <input type="text" id="siteInput" class="form-control form-control-lg" placeholder="example.com">
            <button class="btn btn-warning btn-lg" type="button" onclick="triggerScan()">🔍 סרוק עכשיו</button>
        </div>
        <div id="statusMsg" class="mt-2 text-white-50"></div>
    </div>
</div>

<div class="container mt-5">
    <h3 class="mb-4">📋 ממצאים אחרונים מהרשת</h3>
    <div id="loading">📡 מתחבר למסד הנתונים...</div>
    <div id="dashboard" class="row"></div>
</div>

<script>
// אנחנו מחלקים את המפתח לשני משתנים נפרדים
const p1 = "ghp_"; 
const p2 = "_dXs84PSPy2CTHHDbdUmxrPJ8R0WEaO01b3HF"; // כאן אתה שם את כל ההמשך של המפתח שלך בלי ה-ghp_

// כאן אנחנו מחברים אותם חזרה למשתנה אחד
const GITHUB_AUTH = p1 + p2;    const REPO_OWNER = "144714";
    const REPO_NAME = "Codex-Law-Engine";

    async function triggerScan() {
        const siteInput = document.getElementById('siteInput');
        const msg = document.getElementById('statusMsg');
        const site = siteInput.value.trim();
        
        if(!site) {
            alert("Please enter a URL");
            return;
        }

        msg.innerHTML = "🚀 Sending command to Codex AI...";

        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/ai_law_generator.yml/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + GITHUB_AUTH,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: { target_site: site }
                })
            });

            if (response.ok) {
                msg.innerHTML = "✅ Success! AI Scan started for " + site + ". Check back in 2 minutes.";
            } else {
                const err = await response.json();
                msg.innerHTML = "❌ Error: " + err.message;
            }
        } catch (e) {
            msg.innerHTML = "❌ Connection failed: " + e.message;
        }
    }

    async function loadData() {
        try {
            const response = await fetch('Market_Analysis/scanned_laws.json');
            if (!response.ok) return;
            const data = await response.json();
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';

            for (const [site, info] of Object.entries(data)) {
                const card = document.createElement('div');
                card.className = 'col-md-6 col-lg-4';
                const flaws = info.fix_laws || info.vulnerabilities || [];

                card.innerHTML = `
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h5 class="text-primary fw-bold">${site}</h5>
                            <hr>
                            ${flaws.slice(0, 3).map(f => `
                                <div class="mb-3 text-start">
                                    <strong style="color:#ff7b72">⚠️ ${f.flaw || "Risk"}</strong>
                                    <div style="background:#090c10; padding:8px; font-size:0.8em; border-radius:4px;">
                                        ${f.fix?.law || f.fix || "Analyzing..."}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                dashboard.appendChild(card);
            }
        } catch (e) { console.log("Data not ready yet"); }
    }
    
    loadData();
    setInterval(loadData, 30000);
</script>
</body>
</html>
