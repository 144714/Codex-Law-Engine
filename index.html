<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Codex | מרכז הבקרה העולמי</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(45deg, #1f6feb, #238636); padding: 40px; border-radius: 0 0 20px 20px; text-align: center; }
        .card { background-color: #161b22; border: 1px solid #30363d; color: white; margin-bottom: 20px; }
        .vulnerability-high { color: #ff7b72; font-weight: bold; }
        .fix-law { background-color: #238636; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.9em; }
        #loading { display: block; text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>CODEX LAW ENGINE</h1>
    <p>סורק הבינה המלאכותית הגלובלי - הזן אתר לסריקה מיידית</p>
    
    <div class="container mt-4">
        <div class="input-group mb-3 shadow-lg" style="max-width: 600px; margin: 0 auto;">
            <input type="text" id="siteInput" class="form-control form-control-lg" placeholder="example.com">
            <button class="btn btn-warning btn-lg" type="button" onclick="triggerScan()">🔍 סרוק עכשיו</button>
        </div>
        <div id="statusMsg" class="mt-2 text-white-50"></div>
    </div>
</div>

<div class="container mt-5">
    <h3 class="mb-4">📋 ממצאים אחרונים מהרשת</h3>
    <div id="loading">📡 מתחבר למסד הנתונים...</div>
    <div id="dashboard" class="row"></div>
</div>

<script>
    // פונקציה ששולחת פקודה לגיטהב להתחיל סריקה חדשה
    async function triggerScan() {
        const url = document.getElementById('siteInput').value;
        const msg = document.getElementById('statusMsg');
        
        if (!url) return alert("נא להזין כתובת אתר");
        
        msg.innerHTML = "⌛ שולח פקודה ל-Codex... נא המתן";
        
        // כאן בעתיד נחבר את המפתח (PAT) כדי שהסריקה תרוץ באמת מהדפדפן
        alert("הפקודה נשלחה! הרובוט של Codex יתחיל לסרוק את " + url + " בדקות הקרובות. רענן את הדף בעוד 2 דקות.");
        msg.innerHTML = "✅ הסריקה בדרך! תוצאות יופיעו כאן בקרוב.";
    }

    // הקוד הקודם לטעינת הנתונים נשאר כאן...
    async function loadData() {
        try {
            const response = await fetch('Market_Analysis/scanned_laws.json');
            const data = await response.json();
            const dashboard = document.getElementById('dashboard');
            document.getElementById('loading').style.display = 'none';
            // ... (שאר הלוגיקה של הצגת הכרטיסים)
        } catch(e) {}
    }
    loadData();
</script>
</body>
</html>
