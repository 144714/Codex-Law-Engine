<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEX GENESIS | Global Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #050505; --card: #0a0a0a; --accent: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        
        /* Billion Dollar UI */
        .glass-sidebar { width: 350px; height: 100vh; position: fixed; right: 0; background: #000; border-left: 1px solid var(--accent); padding: 40px; z-index: 1000; }
        .content-area { margin-right: 350px; padding: 60px; }
        
        .nav-item-codex { padding: 15px; margin-bottom: 10px; border: 1px solid var(--accent); border-radius: 4px; cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
        .nav-item-codex:hover, .nav-item-codex.active { background: var(--primary); color: #000; font-weight: 700; box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
        
        .law-card { background: var(--card); border: 1px solid var(--accent); padding: 30px; position: relative; transition: 0.5s; }
        .law-card:hover { border-color: var(--primary); transform: scale(1.02); }
        
        .severity-bar { height: 4px; width: 100%; background: #111; margin-top: 15px; position: relative; }
        .severity-fill { height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        
        .header-glow { font-size: 4rem; font-weight: 700; background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 50px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-box { border: 1px solid var(--accent); padding: 20px; text-align: center; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
    </style>
</head>
<body>

<div class="glass-sidebar">
    <div class="mb-5">
        <h2 class="fw-bold m-0">CODEX <span style="color:var(--primary)">GENESIS</span></h2>
        <p class="text-secondary small">Autonomous Intelligence v.Inf</p>
    </div>
    
    <div id="category-list">
        <div class="text-center opacity-50 p-5">Initializing Oracle...</div>
    </div>
</div>

<div class="content-area">
    <h1 class="header-glow">Market DNA<br>Intelligence</h1>
    
    <div class="stats-grid">
        <div class="stat-box"><h6>GLOBAL ASSETS</h6><h2 id="total-sites" style="color:var(--primary)">0</h2></div>
        <div class="stat-box"><h6>DATA POINTS</h6><h2 id="total-laws">0</h2></div>
        <div class="stat-box"><h6>ENGINE STATUS</h6><h2 class="small text-success">OPERATIONAL</h2></div>
    </div>

    <div id="main-grid" class="row g-4">
        </div>
</div>

<script>
    let registry = {};

    async function init() {
        const r = await fetch('Codex_Intelligence/global_registry.json?t=' + Date.now());
        registry = await r.json();
        renderSidebar();
    }

    function renderSidebar() {
        const list = document.getElementById('category-list');
        const cats = Object.keys(registry);
        let total = 0;
        list.innerHTML = cats.map(c => {
            total += registry[c].length;
            return `<div class="nav-item-codex" onclick="loadCat('${c}', this)">${c.replace('_', ' ')} <span style="float:left opacity:0.5">${registry[c].length}</span></div>`;
        }).join('');
        document.getElementById('total-sites').innerText = total;
    }

    async function loadCat(cat, el) {
        document.querySelectorAll('.nav-item-codex').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '<div class="spinner-border text-info mx-auto"></div>';
        
        let html = '';
        let lawCount = 0;
        
        for (const site of registry[cat]) {
            try {
                const res = await fetch(`Codex_Intelligence/${cat}/${site.replace('.', '_')}.json`);
                const siteData = await res.json();
                
                html += `<div class="col-12"><h2 class="mb-4 mt-5 fw-light">🌐 ${site.toUpperCase()} <span class="fs-6 opacity-50">/ RANK #${siteData.meta.rank}</span></h2></div>`;
                
                siteData.data.forEach(item => {
                    lawCount++;
                    html += `
                        <div class="col-md-6 col-lg-4">
                            <div class="law-card">
                                <div class="text-secondary small mb-2">INTELLIGENCE UNIT</div>
                                <h5 class="fw-bold mb-3">${item.title}</h5>
                                <p class="small opacity-75">${item.description}</p>
                                <div class="bg-black p-2 rounded text-primary mb-3" style="font-size:0.7rem; font-family:monospace">${item.technical_spec || 'GENERIC_DNA'}</div>
                                <div class="small fw-bold">SCARCE INDEX: ${item.severity_score}%</div>
                                <div class="severity-bar"><div class="severity-fill" style="width:${item.severity_score}%"></div></div>
                            </div>
                        </div>`;
                });
            } catch (e) {}
        }
        grid.innerHTML = html;
        document.getElementById('total-laws').innerText = lawCount;
    }

    window.onload = init;
</script>
</body>
</html>
