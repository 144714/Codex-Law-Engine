<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Codex | מרכז הבקרה העולמי</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(45deg, #1f6feb, #238636); padding: 40px; border-radius: 0 0 20px 20px; text-align: center; }
        .card { background-color: #161b22; border: 1px solid #30363d; color: white; margin-bottom: 20px; }
        .vulnerability-high { color: #ff7b72; font-weight: bold; }
        .fix-law { background-color: #238636; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.9em; }
        #loading { display: block; text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>CODEX LAW ENGINE</h1>
    <p>סורק הבינה המלאכותית הגלובלי - דוח מצב בזמן אמת</p>
</div>

<div class="container mt-5">
    <div id="loading">📡 מתחבר למסד הנתונים של ה-AI...</div>
    <div id="dashboard" class="row"></div>
</div>

<script>
    // פונקציה שטוענת את קובץ ה-JSON שיצרנו קודם
    async function loadData() {
        try {
            const response = await fetch('Market_Analysis/scanned_laws.json');
            const data = await response.json();
            const dashboard = document.getElementById('dashboard');
            document.getElementById('loading').style.display = 'none';

            for (const [site, info] of Object.entries(data)) {
                if (!info || (!info.potential_technical_flaws && !info.vulnerabilities)) continue;
                
                let flaws = info.vulnerabilities || info.potential_technical_flaws;
                let cardsHtml = '';

                // טיפול בפורמטים השונים שה-AI פולט
                const vulnerabilities = Array.isArray(flaws) ? flaws : [];
                
                const card = document.createElement('div');
                card.className = 'col-md-6';
                card.innerHTML = `
                    <div class="card shadow">
                        <div class="card-body">
                            <h5 class="card-title text-info">${site}</h5>
                            <hr style="border-color: #30363d">
                            <div class="vulnerabilities-list">
                                ${vulnerabilities.map(v => {
                                    let name = typeof v === 'string' ? v : (v.flaw || "Security Risk");
                                    let fix = v.fix ? (v.fix.law || v.fix.solution || "Pending Fix") : "Generating...";
                                    return `
                                        <div class="mb-3">
                                            <span class="vulnerability-high">⚠️ ${name}</span><br>
                                            <small class="text-secondary">תיקון קודקס:</small>
                                            <div class="fix-law mt-1">${fix}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
                dashboard.appendChild(card);
            }
        } catch (e) {
            document.getElementById('loading').innerHTML = "❌ שגיאה בטעינת הנתונים. וודא שהסריקה הושלמה.";
        }
    }
    loadData();
</script>
</body>
</html>
