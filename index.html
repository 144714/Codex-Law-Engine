<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Law Engine - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .status-badge { font-size: 0.8em; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🛡️ Codex Law Engine - ניתוח אבטחה</span>
        </div>
    </nav>

    <div class="container">
        <div id="dashboard" class="row">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p>טוען נתוני סריקה...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                // משיכת הקובץ עם מנגנון למניעת Cache
                const response = await fetch('Market_Analysis/scanned_laws.json?t=' + Date.now());
                if (!response.ok) throw new Error('File not found');
                
                const data = await response.json();
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = '';

                for (const [site, info] of Object.entries(data)) {
                    // זיהוי רשימת התקלות בכל השמות האפשריים
                    const issues = info.security_flaws || info.vulnerabilities || info.potential_technical_flaws || info.security_issues || [];
                    
                    const card = document.createElement('div');
                    card.className = 'col-md-6 col-lg-4 mb-4';
                    
                    const issuesHtml = issues.length > 0 ? issues.map(f => `
                        <div class="p-2 mb-2 border-start border-danger border-4 bg-light rounded">
                            <div class="fw-bold" style="font-size:0.9em;">⚠️ ${f.flaw || f.name || "איום זוהה"}</div>
                            <div class="text-muted" style="font-size:0.8em;">${f.description || f.flaw_description || "רמת סיכון: " + (f.severity || "Medium")}</div>
                        </div>
                    `).join('') : '<p class="text-muted">אין נתוני פירוט זמינים.</p>';

                    card.innerHTML = `
                        <div class="card shadow-sm h-100">
                            <div class="card-body">
                                <h5 class="card-title text-primary text-truncate" title="${site}">${site}</h5>
                                <hr>
                                ${issuesHtml}
                            </div>
                        </div>
                    `;
                    dashboard.appendChild(card);
                }
            } catch (e) {
                document.getElementById('dashboard').innerHTML = `
                    <div class="alert alert-danger">שגיאה בטעינת הנתונים. וודא שהקובץ scanned_laws.json קיים ומכיל JSON תקין.</div>
                `;
                console.error(e);
            }
        }

        // הפעלה
        loadData();
        // רענון אוטומטי כל דקה
        setInterval(loadData, 60000);
    </script>
</body>
</html>
