<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex DNA | Advanced Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #3b82f6; --text: #f8fafc; --success: #10b981; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
        
        /* Sidebar Style Navigation */
        .sidebar { background: var(--card); border-left: 1px solid #1e293b; height: 100vh; position: fixed; right: 0; top: 0; width: 260px; padding: 20px; z-index: 100; }
        .main-content { margin-right: 260px; padding: 30px; }
        
        /* Dashboard Cards */
        .stat-card { background: var(--card); border: 1px solid #1e293b; border-radius: 12px; padding: 20px; transition: 0.3s; }
        .stat-card:hover { border-color: var(--accent); }
        
        /* Search Bar */
        .search-box { background: var(--card); border: 1px solid #1e293b; color: white; border-radius: 10px; padding: 12px 20px; width: 100%; margin-bottom: 30px; }
        
        /* Content Cards */
        .law-card { background: var(--card); border-radius: 12px; border-top: 4px solid var(--accent); height: 100%; transition: 0.3s; position: relative; }
        .law-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .badge-id { font-family: monospace; color: var(--accent); background: rgba(59, 130, 246, 0.1); padding: 2px 8px; border-radius: 4px; }
        
        .token-block { background: #020617; border-radius: 6px; padding: 10px; font-family: 'Courier New', monospace; font-size: 0.85em; color: var(--success); margin-top: 15px; border: 1px solid #1e293b; }
        
        .nav-link { color: #94a3b8; padding: 12px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; display: flex; align-items: center; }
        .nav-link i { margin-left: 12px; }
        .nav-link.active { background: var(--accent); color: white; }
        .nav-link:hover:not(.active) { background: #1e293b; color: white; }

        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-right: 0; } }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="mb-5 text-center">
        <h2 class="fw-bold"><i class="fas fa-gavel text-primary"></i> CODEX</h2>
        <span class="badge bg-primary">v2.5 Admin</span>
    </div>
    <div class="nav-links">
        <div class="nav-link active" onclick="switchView('overview', this)"><i class="fas fa-home"></i> סקירה כללית</div>
        <div class="nav-link" onclick="loadCategory('scanned_laws.json', this)"><i class="fas fa-database"></i> המאגר הראשי</div>
        <div class="nav-link" onclick="loadCategory('UI-Design/ui-design_vault.json', this)"><i class="fas fa-paint-brush"></i> חוקי עיצוב DNA</div>
        <div class="nav-link" onclick="loadCategory('Security/security_vault.json', this)"><i class="fas fa-shield-alt"></i> אבטחת מידע</div>
        <div class="nav-link" onclick="loadCategory('Accessibility/accessibility_vault.json', this)"><i class="fas fa-universal-access"></i> נגישות</div>
        <div class="nav-link" onclick="loadCategory('UX-Flow/ux-flow_vault.json', this)"><i class="fas fa-user-check"></i> חווית משתמש</div>
        <hr class="my-4" style="border-color: #1e293b">
        <div class="nav-link text-info" onclick="toggleScanner()"><i class="fas fa-plus-circle"></i> סריקה חדשה</div>
    </div>
</nav>

<div class="main-content">
    
    <div id="overview-header" class="row mb-4">
        <div class="col-md-3 mb-3">
            <div class="stat-card">
                <small class="text-secondary">סה"כ אתרים</small>
                <h2 id="count-sites">--</h2>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="stat-card">
                <small class="text-secondary">חוקים במאגר</small>
                <h2 id="count-laws" class="text-primary">--</h2>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <input type="text" id="globalSearch" class="search-box" placeholder="חפש אתר, חוק או ערך CSS..." onkeyup="filterResults()">
        </div>
    </div>

    <div id="scanner-section" class="stat-card mb-4 d-none">
        <h4 class="mb-3 text-info">🔨 מרכז הרצת סריקות AI</h4>
        <textarea id="siteList" class="form-control mb-3 bg-dark text-success" rows="3" placeholder="הכנס כתובות אתרים מופרדות בפסיקים..."></textarea>
        <button onclick="startMassLegislation()" class="btn btn-info w-100 fw-bold">שגר למנוע ה-Codex</button>
    </div>

    <div id="loading" class="text-center p-5 d-none">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div id="dashboard-grid" class="row">
        </div>
</div>

<script>
    let currentData = {};

    async function loadCategory(filePath, btn) {
        // UI Updates
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(btn) btn.classList.add('active');
        document.getElementById('loading').classList.remove('d-none');
        document.getElementById('dashboard-grid').innerHTML = '';

        try {
            const response = await fetch(`Market_Analysis/${filePath}?t=${Date.now()}`);
            if (!response.ok) throw new Error("File Missing");
            currentData = await response.json();
            
            renderDashboard(currentData);
            updateStats(currentData);
        } catch (e) {
            document.getElementById('dashboard-grid').innerHTML = `<div class="text-center p-5">לא נמצאו נתונים בקובץ זה.</div>`;
        } finally {
            document.getElementById('loading').classList.add('d-none');
        }
    }

    function renderDashboard(data) {
        const grid = document.getElementById('dashboard-grid');
        grid.innerHTML = '';

        for (const [site, laws] of Object.entries(data)) {
            const siteWrapper = document.createElement('div');
            siteWrapper.className = 'col-12 mb-5 site-group';
            siteWrapper.setAttribute('data-site', site.toLowerCase());

            let lawsHtml = '';
            Object.entries(laws).forEach(([id, info]) => {
                lawsHtml += `
                    <div class="col-md-4 mb-3 law-item" data-title="${(info.title || '').toLowerCase()}">
                        <div class="law-card p-3 card shadow-sm">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="badge-id">${id}</span>
                                <span class="badge ${info.status === 'Compliant' ? 'bg-success' : 'bg-danger'}">
                                    ${info.status || 'Analysis'}
                                </span>
                            </div>
                            <h6 class="fw-bold">${info.title || 'Untitled Law'}</h6>
                            <p class="small text-secondary mb-2">${info.description || ''}</p>
                            <p class="small text-info"><b>תיקון:</b> ${info.remediation || 'N/A'}</p>
                            ${info.design_token ? `<div class="token-block"><code>${info.design_token}</code></div>` : ''}
                        </div>
                    </div>
                `;
            });

            siteWrapper.innerHTML = `<h3 class="mb-3 border-bottom pb-2">🌐 ${site}</h3><div class="row">${lawsHtml}</div>`;
            grid.appendChild(siteWrapper);
        }
    }

    function updateStats(data) {
        const sitesCount = Object.keys(data).length;
        let lawsCount = 0;
        Object.values(data).forEach(s => lawsCount += Object.keys(s).length);
        
        document.getElementById('count-sites').innerText = sitesCount;
        document.getElementById('count-laws').innerText = lawsCount;
    }

    function filterResults() {
        const query = document.getElementById('globalSearch').value.toLowerCase();
        
        document.querySelectorAll('.site-group').forEach(group => {
            const siteName = group.getAttribute('data-site');
            const items = group.querySelectorAll('.law-item');
            let hasVisibleItem = false;

            items.forEach(item => {
                const title = item.getAttribute('data-title');
                if (title.includes(query) || siteName.includes(query)) {
                    item.classList.remove('d-none');
                    hasVisibleItem = true;
                } else {
                    item.classList.add('d-none');
                }
            });

            group.style.display = hasVisibleItem ? 'block' : 'none';
        });
    }

    function toggleScanner() {
        document.getElementById('scanner-section').classList.toggle('d-none');
    }

    function startMassLegislation() {
        const sites = document.getElementById('siteList').value;
        const url = `https://github.com/144714/Codex-Law-Engine/issues/new?title=MASS_SCAN_REQUEST&body=${encodeURIComponent(sites)}`;
        window.open(url, '_blank');
    }

    // Initial Load
    window.onload = () => loadCategory('scanned_laws.json');
</script>

</body>
</html>
